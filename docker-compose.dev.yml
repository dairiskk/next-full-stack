services:
  next-app:
    image: node:20-alpine
    container_name: next-full-stack-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=development
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:${APP_PORT:-3000}}
    volumes:
      - .:/app
      - next-dev-node-modules:/app/node_modules
      - next-dev-cache:/app/.next
    networks:
      - app-network

volumes:
  next-dev-node-modules:
  next-dev-cache:

networks:
  app-network:
    driver: bridge
